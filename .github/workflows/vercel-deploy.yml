name: Deploy site to Vercel

# GitHub-driven deploy of the GEO marketing site + serverless API (geo-engine/).
# Fires on push to the site/api/config, and can be run manually.
#
# One-time setup (values never go in the repo — add them as GitHub secrets under
# Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — create at vercel.com/account/tokens
#   VERCEL_ORG_ID       — from `.vercel/project.json` after `vercel link`, or the
#   VERCEL_PROJECT_ID   —   Vercel project Settings → General
# Until VERCEL_TOKEN is set, this workflow no-ops (it won't fail your pushes).

on:
  push:
    branches: [main, claude/autopilot-business-idea-48xj3i]
    paths:
      - "geo-engine/site/**"
      - "geo-engine/api/**"
      - "geo-engine/vercel.json"
      - "geo-engine/requirements.txt"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - if: env.VERCEL_TOKEN == ''
        run: echo "VERCEL_TOKEN secret not set — skipping deploy. See geo-engine/DEPLOY.md."

      - if: env.VERCEL_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - if: env.VERCEL_TOKEN != ''
        name: Build & deploy to Vercel (production)
        working-directory: geo-engine
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
